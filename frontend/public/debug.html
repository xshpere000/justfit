<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustFit API 诊断工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #303133; margin-bottom: 20px; }
        .section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section h2 {
            font-size: 18px;
            color: #409EFF;
            margin-bottom: 15px;
            border-bottom: 2px solid #409EFF;
            padding-bottom: 10px;
        }
        .info-item {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #ebeef5;
        }
        .info-item:last-child { border-bottom: none; }
        .label {
            font-weight: 600;
            color: #606266;
            width: 150px;
            flex-shrink: 0;
        }
        .value {
            color: #303133;
            flex: 1;
            word-break: break-all;
        }
        .success { color: #67C23A; }
        .error { color: #F56C6C; }
        .warning { color: #E6A23C; }
        button {
            background: #409EFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover { background: #66B1FF; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .test-result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .test-result.success { background: #f0f9ff; border: 1px solid #67C23A; color: #67C23A; }
        .test-result.error { background: #fef0f0; border: 1px solid #F56C6C; color: #F56C6C; }
        #log {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry { margin: 5px 0; }
        .log-info { color: #409EFF; }
        .log-success { color: #67C23A; }
        .log-error { color: #F56C6C; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 JustFit API 诊断工具</h1>

        <!-- 浏览器信息 -->
        <div class="section">
            <h2>📋 浏览器信息</h2>
            <div class="info-item">
                <span class="label">当前页面 URL:</span>
                <span class="value" id="currentUrl">-</span>
            </div>
            <div class="info-item">
                <span class="label">主机名:</span>
                <span class="value" id="hostname">-</span>
            </div>
            <div class="info-item">
                <span class="label">协议:</span>
                <span class="value" id="protocol">-</span>
            </div>
            <div class="info-item">
                <span class="label">用户代理:</span>
                <span class="value" id="userAgent">-</span>
            </div>
        </div>

        <!-- API 地址检测 -->
        <div class="section">
            <h2>🌐 API 地址检测</h2>
            <div class="info-item">
                <span class="label">动态计算的 API 地址:</span>
                <span class="value" id="detectedApiUrl">-</span>
            </div>
            <div class="info-item">
                <span class="label">API 地址来源:</span>
                <span class="value" id="apiUrlSource">-</span>
            </div>
        </div>

        <!-- 连接测试 -->
        <div class="section">
            <h2>🔌 连接测试</h2>
            <div>
                <button onclick="testApi('localhost')">测试 localhost:22631</button>
                <button onclick="testApi('127.0.0.1')">测试 127.0.0.1:22631</button>
                <button onclick="testApi('current')">测试当前主机:22631</button>
                <button onclick="testApi('10.131.132.133')">测试 10.131.132.133:22631</button>
            </div>
            <div id="testResult"></div>
        </div>

        <!-- 实时日志 -->
        <div class="section">
            <h2>📝 实时日志</h2>
            <div id="log"></div>
        </div>
    </div>

    <script>
        // 初始化浏览器信息
        function initBrowserInfo() {
            document.getElementById('currentUrl').textContent = window.location.href;
            document.getElementById('hostname').textContent = window.location.hostname;
            document.getElementById('protocol').textContent = window.location.protocol;
            document.getElementById('userAgent').textContent = navigator.userAgent;
        }

        // 计算 API 地址（模拟前端逻辑）
        function getApiBaseUrl(hostname) {
            const protocol = window.location.protocol;
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return `${protocol}//localhost:22631`;
            }
            return `${protocol}//${hostname}:22631`;
        }

        // 初始化 API 地址信息
        function initApiInfo() {
            const currentHostname = window.location.hostname;
            const apiUrl = getApiBaseUrl(currentHostname);

            document.getElementById('detectedApiUrl').textContent = apiUrl;
            document.getElementById('apiUrlSource').textContent =
                `基于当前主机名 "${currentHostname}" 动态计算`;
        }

        // 日志函数
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 测试 API 连接
        async function testApi(target) {
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '<div class="test-result">测试中...</div>';

            let baseUrl;
            switch(target) {
                case 'localhost':
                    baseUrl = 'http://localhost:22631';
                    break;
                case '127.0.0.1':
                    baseUrl = 'http://127.0.0.1:22631';
                    break;
                case 'current':
                    baseUrl = getApiBaseUrl(window.location.hostname);
                    break;
                case '10.131.132.133':
                    baseUrl = 'http://10.131.132.133:22631';
                    break;
            }

            log(`开始测试: ${baseUrl}/api/system/health`);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(`${baseUrl}/api/system/health`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<div class="test-result success">✅ 连接成功！\n\n${JSON.stringify(data, null, 2)}</div>`;
                    log(`✅ ${baseUrl} 连接成功`, 'success');
                } else {
                    resultDiv.innerHTML = `<div class="test-result error">❌ HTTP ${response.status}: ${response.statusText}</div>`;
                    log(`❌ ${baseUrl} 返回 HTTP ${response.status}`, 'error');
                }
            } catch (error) {
                let errorMsg = error.message;
                if (error.name === 'AbortError') {
                    errorMsg = '请求超时（5秒）';
                }
                resultDiv.innerHTML = `<div class="test-result error">❌ 连接失败\n\n${errorMsg}</div>`;
                log(`❌ ${baseUrl} 连接失败: ${errorMsg}`, 'error');
            }
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            initBrowserInfo();
            initApiInfo();
            log('诊断工具已加载');
            log('请点击上方按钮测试 API 连接');
        });
    </script>
</body>
</html>
